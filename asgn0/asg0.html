<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vector Library</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>

  <body>
    <div id="canvas-container">
      <canvas id="VectorCanvas" width="400" height="400"></canvas>

      <div class="controls">
        <div class="vector-input">
          <span>v1: </span>
          <label for="v1xCoordInput">x</label>
          <input type="number" id="v1xCoordInput" step="any" title="x value">
          <label for="v1yCoordInput">y</label>
          <input type="number" id="v1yCoordInput" step="any" title="y value">
        </div>
        <div class="vector-input">
          <span>v2: </span>
          <label for="v2xCoordInput">x</label>
          <input type="number" id="v2xCoordInput" step="any" title="x value">
          <label for="v2yCoordInput">y</label>
          <input type="number" id="v2yCoordInput" step="any" title="y value">
        </div>

        <button id="drwBtn" title="Draw vectors">Draw</button>

        <div class="operation-controls">

          <label for="opBox">Operation:</label>
          <select id="opBox">
            <option value="add">Add</option>
            <option value="sub">Subtract</option>
            <option value="mul">Multiply</option>
            <option value="div">Divide</option>
            <option value="angle">Angle</option>
            <option value="area">Area</option>
            <option value="mag">Magnitude</option>
            <option value="norm">Normalize</option>
          </select>

          <label for="scalarInput">Scalar:</label>
          <input type="number" id="scalarInput" step="any" title="Enter scalar">

          <div>
            <button id="opBtn" title="Draw Operation">Draw / Operation</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./asg0.js"></script>
  </body>
</html>
